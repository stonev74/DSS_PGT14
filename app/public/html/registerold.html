<!DOCTYPE html>
<html>
    <head>
        <title>Register</title>
        <meta charset="utf-8">
        <link rel="icon" type="image/x-icon" href="/imgs/foodie.ico">
        <link rel="stylesheet" href="/css/style.css">
        <script src="../js/login.js" defer></script>
    </head>
    <body>
        <header>
            <a href="/"><img id="logo" src="../imgs/logo.png"></a>
            <h1>Welcome to Foodies 'R' Us!</h1>
        </header>
        <main>
        <p>Please enter a username and password to make an account.</p>

            <form method="post" action="/register" id="register_form" autocomplete="off" novalidate>

                <!-- CSRF token: uncomment when csrf protection is added to app.js -->
                <!-- <input type="hidden" name="_csrf" value="<%= csrfToken %>"> -->

                <div class="field">
                    <label for="username_input">Username</label>
                    <input
                        type="text"
                        id="username_input"
                        name="username_input"
                        placeholder="Enter a username"
                        maxlength="50"
                        required
                        spellcheck="false"
                        autocorrect="off"
                        autocapitalize="none"
                    >
                </div>

                <div class="field">
                    <label for="password_input">Password</label>
                    <input
                        type="password"
                        id="password_input"
                        name="password_input"
                        placeholder="••••••••"
                        maxlength="100"
                        required
                    >
                </div>

                <button type="submit" id="login_btn" class="submit-btn">Register</button>
                <button id="register-btn" class="submit-btn">Register</button>
            </form>
        </main>
    </body>
</html>
