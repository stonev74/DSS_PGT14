<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Executive Insights</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/x-icon" href="/imgs/foodie.ico">
        <link rel="stylesheet" href="/css/index-style.css">
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
        <script src="../js/index.js" defer></script>
        <script src="../js/main.js" defer></script>
    </head>
    <body>
        <!-- Header -->
        <header>
            <a class="header-left" href="/index.html">
                <div class="brand-icon">
                    <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
                        <rect x="1" y="1" width="7" height="7" stroke="#7a9cc4" stroke-width="1"/>
                        <rect x="10" y="1" width="7" height="7" stroke="#7a9cc4" stroke-width="1"/>
                        <rect x="1" y="10" width="7" height="7" stroke="#7a9cc4" stroke-width="1"/>
                        <rect x="10" y="10" width="7" height="7" fill="#7a9cc4"/>
                    </svg>
                </div>
                <span class="brand-name">Executive Insights</span>
            </a>

            <div class="dropdown">
                <button id="login_link">Username
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                        <path d="M2 3.5L5 6.5L8 3.5" stroke="#7a9cc4" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </button>
                <div class="dropdown-content">
                    <a id="logout_btn" href="/">Sign out</a>
                </div>
            </div>
        </header>

        <!-- Nav -->
        <nav>
            <ul>
                <li class="active"><a href="/index.html">Home</a></li>
                <li><a href="/posts">Latest Posts</a></li>
                <li><a href="/my_posts">My Posts</a></li>
            </ul>
        </nav>

        <!-- Main content -->
        <main>

            <div class="hero-section">
                <div class="hero-text">
                    <h2>Share your <em>insight.</em></h2>
                    <p>Contribute your perspective to the executive feed.</p>
                </div>
                <a class="link_btn" href="/my_posts">Make a Post</a>
            </div>

            <div class="posts-section">
                <div class="posts-section-header">
                    <h2>Latest Posts</h2>
                    <a class="link_btn" href="/posts">See all posts</a>
                </div>

                <!-- Posts injected here by index.js -->
                <div id="postsList"></div>
            </div>

        </main>

        <footer>
            &copy; Executive Insights. All rights reserved.
        </footer>

    </body>
</html>
